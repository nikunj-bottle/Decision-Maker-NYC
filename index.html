<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NYC Genie</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>


  <div class="header">
    What should I do today <span class="genie">(NYC Genie 🔮)</span>
  </div>


  <div class="controls">
    <span class="label">Mood?:</span>
    <button>Hungry</button>
    <button>Chill</button>
    <button>Fun</button>
    <button class="decide">Decide!</button>
  </div>


  <h2>For the best day EVER!</h2>

  
  <div class="ball-wrapper">
    <div class="ball">
      <p id="result-text"></p>
      <img id="image" src="" alt="" />
    </div>
    <div class="stand"></div>
  </div>

</body>
</html>
